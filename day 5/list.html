<body>
    <h1>Ordered List of Items required to make Tea</h1>
    <ol type="a"
        <li>Milk</li>
        <li>Sugar</li>

    <ul style="List-style-type ;squer"
        <li>CPU</li>
        <li>RAM</li>
        <li>Storage</li>
        <li>Power Supply</li>
    </ul>
</body>
